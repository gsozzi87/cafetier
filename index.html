<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAFETIER</title>
<link rel="manifest" href="/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F7E2;
  --bg-soft: #EFEFD8;
  --card: #FFFDF7;
  --card-2: #FAF8F0;
  --line: #D9D4C4;
  --text: #2E261F;
  --muted: #6A5A49;
  --muted-2: #8A7B6B;
  --green: #006837;
  --green-2: #009245;
  --cream: #E3E49E;
  --brown: #603813;
  --brown-2: #8C6239;
  --danger: #B64848;
  --blue: #3F6F8A;
  --shadow: 0 14px 40px rgba(96,56,19,.08);
  --radius: 18px;
  --radius-sm: 12px;
  --sidebar-w: 286px;
  --header-h: 74px;
  --font-display: 'Playfair Display', serif;
  --font-body: 'Inter', sans-serif;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family:var(--font-body);
  background:linear-gradient(180deg,#F7F7E2 0%, #F4F2DF 100%);
  color:var(--text);
}
button,input,select,textarea{font:inherit}
button{cursor:pointer}
a{text-decoration:none;color:inherit}
#app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;height:100vh}
.sidebar{
  background:linear-gradient(180deg,#fffdf7 0%, #f7f5ea 100%);
  border-right:1px solid var(--line);
  padding:20px 18px;
  overflow:auto;
}
.brand{
  display:flex;gap:14px;align-items:center;padding:10px 10px 20px;border-bottom:1px solid var(--line);margin-bottom:18px;
}
.brand-mark{
  width:52px;height:52px;border-radius:16px;background:radial-gradient(circle at 30% 30%, var(--cream), #cfd27b 55%, #b6bc63 100%);
  border:1px solid #d7d899;box-shadow:inset 0 1px 0 rgba(255,255,255,.5);
}
.brand h1{margin:0;font-family:var(--font-display);font-size:28px;line-height:1;color:var(--green);letter-spacing:1px}
.brand p{margin:4px 0 0;color:var(--brown-2);font-size:12px;letter-spacing:.6px}
.nav-group{margin-bottom:16px}
.nav-title{font-size:11px;text-transform:uppercase;letter-spacing:1.1px;color:var(--muted-2);padding:10px 12px 8px}
.nav-btn{
  width:100%;border:none;background:transparent;color:var(--text);display:flex;align-items:center;gap:12px;
  padding:12px 14px;border-radius:14px;font-weight:600;text-align:left;margin:2px 0;
}
.nav-btn .ico{
  width:34px;height:34px;border-radius:10px;background:var(--bg-soft);display:grid;place-items:center;font-size:16px;color:var(--green);
}
.nav-btn.active{background:#fff;border:1px solid #dfdac8;box-shadow:var(--shadow)}
.nav-btn.active .ico{background:var(--green);color:#fff}
.main{display:grid;grid-template-rows:var(--header-h) 1fr;min-width:0}
.header{
  border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 24px;
  background:rgba(255,253,247,.78);backdrop-filter:blur(8px)
}
.header h2{margin:0;font-family:var(--font-display);font-size:31px;color:var(--green)}
.header .sub{color:var(--brown-2);font-size:13px}
.content{padding:24px;overflow:auto}
.page{display:none}.page.active{display:block}
.grid{display:grid;gap:14px}.grid.stats{grid-template-columns:repeat(4,minmax(0,1fr));margin-bottom:20px}.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}.grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}
.card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);
}
.card.soft{background:var(--card-2)}
.stat .label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted-2);margin-bottom:10px}
.stat .value{font-family:var(--font-display);font-size:30px;line-height:1.05;color:var(--green)}
.stat .meta{margin-top:8px;font-size:12px;color:var(--muted)}
.section-title{margin:24px 0 12px;font-family:var(--font-display);font-size:22px;color:var(--brown)}
.toolbar{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-bottom:14px}
.search{
  min-width:260px;max-width:380px;width:100%;background:#fff;border:1px solid var(--line);border-radius:999px;padding:12px 16px;color:var(--text)
}
.btn{border:none;border-radius:12px;padding:11px 16px;font-weight:700}
.btn.primary{background:var(--green);color:#fff}
.btn.primary:hover{background:var(--green-2)}
.btn.secondary{background:#fff;border:1px solid var(--line);color:var(--text)}
.btn.secondary:hover{background:var(--bg-soft)}
.btn.danger{background:var(--danger);color:#fff}
.btn.small{padding:8px 12px;font-size:13px}
.table-wrap{overflow:auto}
table{width:100%;border-collapse:separate;border-spacing:0 8px}
th{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted-2);text-align:left;padding:0 14px 4px}
td{background:#fff;padding:14px;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
td:first-child{border-left:1px solid var(--line);border-radius:12px 0 0 12px}td:last-child{border-right:1px solid var(--line);border-radius:0 12px 12px 0}
.list{display:flex;flex-direction:column;gap:10px}
.item{background:#fff;border:1px solid var(--line);border-radius:16px;padding:15px 16px;display:flex;justify-content:space-between;gap:12px;align-items:flex-start;box-shadow:var(--shadow)}
.item .title{font-weight:700}.item .sub{margin-top:4px;font-size:13px;color:var(--muted)}
.item .amount{font-weight:800;color:var(--brown);white-space:nowrap}
.badge{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:6px 10px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.7px}
.badge.green{background:rgba(0,104,55,.1);color:var(--green)}
.badge.blue{background:rgba(63,111,138,.12);color:var(--blue)}
.badge.brown{background:rgba(140,98,57,.12);color:var(--brown-2)}
.badge.red{background:rgba(182,72,72,.12);color:var(--danger)}
.progress{height:10px;background:#ebe7d6;border-radius:999px;overflow:hidden;margin-top:10px}.progress>span{display:block;height:100%;background:linear-gradient(90deg,var(--green),var(--green-2));border-radius:999px}
.kpis{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.kpi{background:var(--card-2);border:1px dashed #d8d2bd;border-radius:14px;padding:14px}.kpi .k{font-size:12px;color:var(--muted)}.kpi .v{margin-top:4px;font-weight:800;font-size:20px}
.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}.form-group.full{grid-column:1/-1}
label{font-size:12px;font-weight:700;color:var(--muted)}
input,select,textarea{width:100%;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 14px;color:var(--text)}
textarea{min-height:84px;resize:vertical}
.empty{padding:28px;border:1px dashed #d6cfbb;border-radius:16px;background:rgba(255,255,255,.45);text-align:center;color:var(--muted)}
.modal-backdrop{position:fixed;inset:0;background:rgba(46,38,31,.38);display:none;place-items:center;z-index:1000;padding:24px}.modal-backdrop.open{display:grid}
.modal{width:min(760px,100%);max-height:90vh;overflow:auto;background:#fffdf7;border:1px solid var(--line);border-radius:24px;box-shadow:0 30px 80px rgba(46,38,31,.22);padding:20px}
.modal-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}.modal-head h3{margin:0;font-family:var(--font-display);font-size:28px;color:var(--green)}
.actions{display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;margin-top:12px}
.footer-note{margin-top:24px;font-size:12px;color:var(--muted-2)}
@media (max-width: 1180px){.grid.stats{grid-template-columns:repeat(2,minmax(0,1fr))}.grid.three,.grid.two,.form-grid{grid-template-columns:1fr}}
@media (max-width: 920px){#app{grid-template-columns:1fr}.sidebar{display:none}.main{grid-template-rows:auto 1fr}.header{padding:18px 16px}.content{padding:16px}.grid.stats{grid-template-columns:1fr}.header h2{font-size:24px}}
</style>
</head>
<body>
<div id="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark"></div>
      <div>
        <h1>CAFETIER</h1>
        <p>Culto por el café</p>
      </div>
    </div>

    <div class="nav-group">
      <div class="nav-title">Principal</div>
      <button class="nav-btn active" data-page="dashboard"><span class="ico">◫</span>Dashboard</button>
      <button class="nav-btn" data-page="pos"><span class="ico">🛒</span>Venta</button>
      <button class="nav-btn" data-page="orders"><span class="ico">📋</span>Pedidos</button>
      <button class="nav-btn" data-page="production"><span class="ico">🔥</span>Producción</button>
      <button class="nav-btn" data-page="inventory"><span class="ico">📦</span>Inventario</button>
    </div>

    <div class="nav-group">
      <div class="nav-title">Gestión</div>
      <button class="nav-btn" data-page="clients"><span class="ico">👥</span>Clientes</button>
      <button class="nav-btn" data-page="products"><span class="ico">☕</span>Catálogo</button>
      <button class="nav-btn" data-page="expenses"><span class="ico">💸</span>Gastos</button>
      <button class="nav-btn" data-page="capital"><span class="ico">💰</span>Capital y utilidades</button>
      <button class="nav-btn" data-page="machineLog"><span class="ico">🔧</span>Bitácora máquina</button>
      <button class="nav-btn" data-page="config"><span class="ico">⚙️</span>Configuración</button>
    </div>
  </aside>

  <main class="main">
    <header class="header">
      <div>
        <h2 id="headerTitle">Dashboard</h2>
        <div class="sub">Casa tostadora · sistema abierto sin usuarios</div>
      </div>
      <div class="badge brown">Culto por el café</div>
    </header>
    <section id="content" class="content"></section>
  </main>
</div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modalTitle">Modal</h3>
      <button class="btn secondary small" onclick="closeModal()">Cerrar</button>
    </div>
    <div id="modalBody"></div>
    <div id="modalActions" class="actions"></div>
  </div>
</div>

<script>
const APP = {
  currentPage: 'dashboard',
  currentActor: 'Sistema',
  data: {}
};

const pageTitles = {
  dashboard: 'Dashboard', pos: 'Venta', orders: 'Pedidos', production: 'Producción', inventory: 'Inventario',
  clients: 'Clientes', products: 'Catálogo', expenses: 'Gastos', capital: 'Capital y utilidades', machineLog: 'Bitácora máquina', config: 'Configuración'
};

async function api(path, opts = {}) {
  const res = await fetch('/api' + path, {
    method: opts.method || 'GET',
    headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  return res.json();
}
async function apiForm(path, formData) {
  const res = await fetch('/api' + path, { method: 'POST', body: formData });
  return res.json();
}
const fmt = (n) => new Intl.NumberFormat('es-MX', { style:'currency', currency:'MXN', maximumFractionDigits:2 }).format(Number(n||0));
const fmtNum = (n) => new Intl.NumberFormat('es-MX').format(Number(n||0));
const fmtKg = (n) => `${Number(n||0).toFixed(1)} kg`;
const fmtPct = (n) => `${Number(n||0).toFixed(1)}%`;
const esc = (s='') => String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

function setPage(page) {
  APP.currentPage = page;
  document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.page === page));
  document.getElementById('headerTitle').textContent = pageTitles[page] || 'CAFETIER';
  renderPage(page);
}

function openModal(title, bodyHtml, actionsHtml='') {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHtml;
  document.getElementById('modalActions').innerHTML = actionsHtml;
  document.getElementById('modalBackdrop').classList.add('open');
}
function closeModal(){ document.getElementById('modalBackdrop').classList.remove('open'); }

function statusBadge(status='') {
  const map = {
    pendiente:['brown','Pendiente'], en_produccion:['blue','En producción'], listo:['green','Listo'],
    enviado_parcial:['brown','Envío parcial'], entregado:['green','Entregado'], pagado:['green','Pagado'], cancelado:['red','Cancelado']
  };
  const [cls, label] = map[status] || ['brown', status];
  return `<span class="badge ${cls}">${esc(label)}</span>`;
}

async function renderPage(page) {
  const el = document.getElementById('content');
  el.innerHTML = '<div class="empty">Cargando…</div>';
  const pages = { dashboard: renderDashboard, pos: renderPOS, orders: renderOrders, production: renderProduction, inventory: renderInventory, clients: renderClients, products: renderProducts, expenses: renderExpenses, capital: renderCapital, machineLog: renderMachineLog, config: renderConfig };
  if (pages[page]) await pages[page](el);
}

async function renderDashboard(el) {
  const month = new Date().toISOString().slice(0,7);
  const res = await api(`/dashboard?month=${month}`);
  const d = res.data || {};
  el.innerHTML = `
    <div class="grid stats">
      <div class="card stat"><div class="label">Ingresos del mes</div><div class="value">${fmt(d.revenue)}</div><div class="meta">Cobros registrados</div></div>
      <div class="card stat"><div class="label">Utilidad neta</div><div class="value">${fmt(d.net_profit)}</div><div class="meta">Después de gastos</div></div>
      <div class="card stat"><div class="label">Kg vendidos</div><div class="value">${fmtKg(d.kg_sold)}</div><div class="meta">Venta mostrador + pedidos</div></div>
      <div class="card stat"><div class="label">Kg tostados</div><div class="value">${fmtKg(d.kg_roasted)}</div><div class="meta">Producción del mes</div></div>
    </div>

    <div class="grid two">
      <div class="card">
        <div class="section-title" style="margin-top:0">Resumen financiero</div>
        <div class="kpis">
          <div class="kpi"><div class="k">Costos directos</div><div class="v">${fmt(d.direct_costs)}</div></div>
          <div class="kpi"><div class="k">Otros gastos</div><div class="v">${fmt(d.other_expenses)}</div></div>
          <div class="kpi"><div class="k">Costo por kg</div><div class="v">${fmt(d.cost_per_kg)}</div></div>
          <div class="kpi"><div class="k">Ganancia por kg</div><div class="v">${fmt(d.profit_per_kg)}</div></div>
        </div>
        <div class="footer-note">Merma promedio: ${fmtPct(d.avg_loss_pct)} · Pedidos activos: ${fmtNum(d.active_orders)}</div>
      </div>

      <div class="card soft">
        <div class="section-title" style="margin-top:0">Reparto de utilidades</div>
        <div class="list">
          ${(d.profit_shares || []).map(p => `<div class="item"><div><div class="title">${esc(p.name)}</div><div class="sub">${esc(p.share_label || (p.share + '%'))}</div></div><div class="amount">${fmt(p.amount)}</div></div>`).join('') || '<div class="empty">Sin datos</div>'}
        </div>
        <div class="footer-note">Configurado como 50% Itza + Gastón y 50% Axel.</div>
      </div>
    </div>

    <div class="grid two">
      <div class="card">
        <div class="section-title" style="margin-top:0">Capital invertido</div>
        <div class="list">
          ${(d.capital || []).map(c => `
            <div class="item">
              <div style="flex:1">
                <div class="title">${esc(c.user_name)}</div>
                <div class="sub">Invertido: ${fmt(c.invested)} · Recuperado: ${fmt(c.recovered)}</div>
                <div class="progress"><span style="width:${c.invested > 0 ? Math.min(100, (c.recovered / c.invested) * 100) : 0}%"></span></div>
              </div>
              <div class="amount">${fmt((c.invested || 0) - (c.recovered || 0))}</div>
            </div>`).join('') || '<div class="empty">Sin aportes de capital</div>'}
        </div>
      </div>
      <div class="card">
        <div class="section-title" style="margin-top:0">Gastos por socio</div>
        <div class="list">
          ${(d.expenses_by_user || []).map(g => `<div class="item"><div><div class="title">${esc(g.paid_by)}</div><div class="sub">Este mes</div></div><div class="amount">${fmt(g.total)}</div></div>`).join('') || '<div class="empty">Sin gastos este mes</div>'}
        </div>
      </div>
    </div>`;
}

let cart = [];
async function renderPOS(el) {
  const res = await api('/products');
  const products = res.data || [];
  cart = [];
  el.innerHTML = `
    <div class="toolbar">
      <input class="search" id="posSearch" placeholder="Buscar producto" oninput="filterProducts()">
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn secondary" onclick="openBigOrderModal()">Nuevo pedido grande</button>
      </div>
    </div>
    <div class="grid three" id="posGrid">
      ${products.map(p => `<div class="card soft" data-name="${esc((p.name+' '+(p.presentation||'')).toLowerCase())}">
        <div class="title">${esc(p.name)}</div>
        <div class="sub">${esc(p.presentation || '')}</div>
        <div style="margin:10px 0 14px;font-family:var(--font-display);font-size:28px;color:var(--green)">${fmt(p.price)}</div>
        <button class="btn primary" onclick="addToCart(${p.id}, '${String(p.name).replace(/'/g, "\\'")}', ${Number(p.price)}, '${String(p.presentation || '').replace(/'/g, "\\'")}')">Agregar</button>
      </div>`).join('') || '<div class="empty">No hay productos cargados</div>'}
    </div>
    <div class="section-title">Carrito</div>
    <div class="card" id="cartBox"><div class="empty">No agregaste productos.</div></div>`;
}
function filterProducts() {
  const q = document.getElementById('posSearch').value.toLowerCase();
  document.querySelectorAll('#posGrid > .card').forEach(card => card.style.display = card.dataset.name.includes(q) ? '' : 'none');
}
function addToCart(id, name, price, presentation) {
  const row = cart.find(x => x.id === id);
  if (row) row.qty += 1; else cart.push({ id, name, price, presentation, qty: 1 });
  drawCart();
}
function cartTotal() { return cart.reduce((s, x) => s + x.price * x.qty, 0); }
function drawCart() {
  const box = document.getElementById('cartBox');
  if (!box) return;
  if (!cart.length) { box.innerHTML = '<div class="empty">No agregaste productos.</div>'; return; }
  box.innerHTML = `
    <div class="list">
      ${cart.map((p, idx) => `<div class="item"><div style="flex:1"><div class="title">${esc(p.name)}</div><div class="sub">${esc(p.presentation)} · ${fmt(p.price)}</div></div><div style="display:flex;align-items:center;gap:8px"><button class="btn secondary small" onclick="changeQty(${idx}, -1)">−</button><strong>${p.qty}</strong><button class="btn secondary small" onclick="changeQty(${idx}, 1)">+</button><div class="amount">${fmt(p.qty * p.price)}</div></div></div>`).join('')}
    </div>
    <div class="actions" style="justify-content:space-between;margin-top:18px">
      <div class="title">Total: ${fmt(cartTotal())}</div>
      <div style="display:flex;gap:10px"><button class="btn secondary" onclick="cart=[]; drawCart()">Vaciar</button><button class="btn primary" onclick="checkoutRetail()">Cobrar</button></div>
    </div>`;
}
function changeQty(i, delta){ cart[i].qty += delta; if (cart[i].qty <= 0) cart.splice(i,1); drawCart(); }
function openBigOrderModal() {
  openModal('Nuevo pedido grande', `
    <div class="form-grid">
      <div class="form-group"><label>Cliente</label><input id="boClient"></div>
      <div class="form-group"><label>Fecha de entrega</label><input type="date" id="boDelivery"></div>
      <div class="form-group"><label>Kg totales</label><input type="number" step="0.1" id="boKg"></div>
      <div class="form-group"><label>Precio por kg</label><input type="number" step="0.01" id="boPrice"></div>
      <div class="form-group"><label>Anticipo</label><input type="number" step="0.01" id="boAdvance" value="0"></div>
      <div class="form-group"><label>Método anticipo</label><select id="boMethod"><option value="transferencia">Transferencia</option><option value="efectivo">Efectivo</option><option value="tarjeta">Tarjeta</option></select></div>
      <div class="form-group full"><label>Notas</label><textarea id="boNotes"></textarea></div>
    </div>`, `<button class="btn primary" onclick="saveBigOrder()">Guardar pedido</button>`);
}
async function saveBigOrder() {
  const total_kg = Number(document.getElementById('boKg').value || 0);
  const price_per_kg = Number(document.getElementById('boPrice').value || 0);
  const total_amount = total_kg * price_per_kg;
  const r = await api('/orders', { method:'POST', body:{ client_name: document.getElementById('boClient').value || 'Sin nombre', delivery_date: document.getElementById('boDelivery').value, total_kg, price_per_kg, total_amount, status:'pendiente', notes: document.getElementById('boNotes').value, is_retail:false, created_by: APP.currentActor } });
  const anticipo = Number(document.getElementById('boAdvance').value || 0);
  if (r.success && anticipo > 0) {
    await api(`/orders/${r.data.id}/payments`, { method:'POST', body:{ amount: anticipo, payment_method: document.getElementById('boMethod').value, notes:'Anticipo', registered_by: APP.currentActor } });
  }
  closeModal();
  setPage('orders');
}
async function checkoutRetail() {
  if (!cart.length) return;
  const total_amount = cartTotal();
  await api('/orders', { method:'POST', body:{ client_name:'Mostrador', total_amount, is_retail:true, payment_method:'efectivo', created_by: APP.currentActor, status:'pagado', items: cart.map(x => ({ product_id:x.id, product_name:x.name, quantity:x.qty, unit:'pz', unit_price:x.price, subtotal:x.price * x.qty })) } });
  cart = [];
  drawCart();
  alert('Venta registrada');
}

async function renderOrders(el) {
  const r = await api('/orders');
  const orders = (r.data || []).filter(o => !o.is_retail);
  el.innerHTML = `

      <div class="form-group"><label>Tipo</label><select id="mlType"><option value="mantenimiento">Mantenimiento</option><option value="mejora">Mejora</option><option value="pieza">Pieza</option><option value="incidencia">Incidencia</option><option value="horas">Horas</option></select></div>
      <div class="form-group"><label>Costo</label><input type="number" step="0.01" id="mlCost" value="0"></div>
      <div class="form-group"><label>Horas</label><input type="number" step="0.01" id="mlHours" value="0"></div>
      <div class="form-group full"><label>Descripción</label><textarea id="mlDesc"></textarea></div>
    </div>`, `<button class="btn primary" onclick="saveMachineLog()">Guardar</button>`);
}
async function saveMachineLog() {
  await api('/machine-log', { method:'POST', body:{ log_date: document.getElementById('mlDate').value, log_type: document.getElementById('mlType').value, description: document.getElementById('mlDesc').value, cost: Number(document.getElementById('mlCost').value || 0), hours: Number(document.getElementById('mlHours').value || 0), registered_by: APP.currentActor } });
  closeModal(); setPage('machineLog');
}
async function deleteMachineLog(id){ if(!confirm('¿Eliminar registro?')) return; await api(`/machine-log/${id}`, {method:'DELETE'}); setPage('machineLog'); }

async function renderConfig(el) {
  const [settings, profiles, origins, varieties, cats] = await Promise.all([api('/settings'), api('/roast_profiles'), api('/origins'), api('/varieties'), api('/expense_categories')]);
  const s = settings.data || {};
  el.innerHTML = `
    <div class="grid two">
      <div class="card">
        <div class="section-title" style="margin-top:0">Parámetros generales</div>
        <div class="form-grid">
          <div class="form-group"><label>kW máquina</label><input id="cfgKw" type="number" step="0.01" value="${esc(s.machine_kw || 0)}"></div>
          <div class="form-group"><label>Precio kWh</label><input id="cfgKwh" type="number" step="0.01" value="${esc(s.kwh_price || 0)}"></div>
          <div class="form-group full"><label>API Key Claude</label><input id="cfgClaude" value="${esc(s.claude_api_key || '')}"></div>
        </div>
        <button class="btn primary" onclick="saveSettings()">Guardar configuración</button>
      </div>
      <div class="card soft">
        <div class="section-title" style="margin-top:0">Modelo abierto</div>
        <div class="list">
          <div class="item"><div><div class="title">Sin login</div><div class="sub">Todos ven todo.</div></div><div>${statusBadge('pagado')}</div></div>
          <div class="item"><div><div class="title">Reparto fijo</div><div class="sub">Itza + Gastón = 50% · Axel = 50%</div></div><div class="badge brown">Activo</div></div>
          <div class="item"><div><div class="title">Tema claro</div><div class="sub">Adaptado al manual de marca.</div></div><div class="badge green">Marca</div></div>
        </div>
      </div>
    </div>
    <div class="grid three" style="margin-top:16px">
      ${configListCard('Perfiles de tueste', profiles.data || [], 'roast_profiles')}
      ${configListCard('Orígenes', origins.data || [], 'origins')}
      ${configListCard('Variedades', varieties.data || [], 'varieties')}
    </div>
    <div class="grid three" style="margin-top:16px">
      ${configListCard('Categorías de gasto', cats.data || [], 'expense_categories')}
    </div>`;
}
function configListCard(title, items, table) {
  return `<div class="card"><div class="section-title" style="margin-top:0">${title}</div><div class="list">${items.map(i => `<div class="item"><div class="title">${esc(i.name)}</div><button class="btn danger small" onclick="deleteConfigItem('${table}', ${i.id})">Eliminar</button></div>`).join('') || '<div class="empty">Vacío</div>'}</div><div class="actions"><input id="new_${table}" placeholder="Nuevo elemento"><button class="btn primary" onclick="addConfigItem('${table}')">Agregar</button></div></div>`;
}
async function saveSettings(){ await api('/settings', {method:'PUT', body:{ machine_kw: document.getElementById('cfgKw').value, kwh_price: document.getElementById('cfgKwh').value, claude_api_key: document.getElementById('cfgClaude').value }}); alert('Configuración guardada'); }
async function addConfigItem(table){ const input = document.getElementById('new_' + table); const name = input.value.trim(); if(!name) return; const body = table === 'expense_categories' ? {name, is_direct_cost:0} : {name}; await api('/' + table, {method:'POST', body}); setPage('config'); }
async function deleteConfigItem(table,id){ if(!confirm('¿Eliminar elemento?')) return; await api(`/${table}/${id}`, {method:'DELETE'}); setPage('config'); }

Array.from(document.querySelectorAll('.nav-btn')).forEach(btn => btn.addEventListener('click', () => setPage(btn.dataset.page)));
document.getElementById('modalBackdrop').addEventListener('click', e => { if(e.target.id === 'modalBackdrop') closeModal(); });
setPage('dashboard');
</script>
</body>
</html>
