<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAFETIER ERP</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div id="app">
    <aside class="sidebar">
      <div class="brand">
        <h1>CAFETIER</h1>
        <p>ERP para tostadora de café</p>
      </div>
      <nav class="nav">
        <div class="nav-section">Operación</div>
        <div class="nav-item active" data-view="dashboard">Dashboard</div>
        <div class="nav-item" data-view="sales">Ventas</div>
        <div class="nav-item" data-view="purchases">Compras</div>
        <div class="nav-item" data-view="roasting">Tostado</div>
        <div class="nav-item" data-view="inventory">Inventario</div>
        <div class="nav-section">Finanzas</div>
        <div class="nav-item" data-view="capital">Capital & Utilidades</div>
        <div class="nav-item" data-view="expenses">Gastos</div>
        <div class="nav-item" data-view="machine">Máquina</div>
        <div class="nav-section">Maestros</div>
        <div class="nav-item" data-view="config">Configuración</div>
      </nav>
    </aside>

    <main class="main">
      <div class="topbar">
        <div>
          <h2 id="pageTitle">Dashboard</h2>
        </div>
        <div class="actions line-actions">
          <span class="pill" id="statusPill">Conectando...</span>
          <button class="btn ghost sm" id="reloadBtn">Recargar</button>
        </div>
      </div>
      <div class="content" id="content">
        <div class="empty">Cargando...</div>
      </div>
    </main>
  </div>

  <div class="toast-wrap" id="toasts"></div>
  <script src="/app.js"></script>
</body>
</html>
